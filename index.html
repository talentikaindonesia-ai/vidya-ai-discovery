            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "Untuk siapa Talentika ditujukan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Talentika ditujukan untuk pelajar SMP, SMA, mahasiswa, dan generasi muda Indonesia yang ingin mengenali potensi diri, memilih jurusan kuliah, mengembangkan karir, atau mencari beasiswa dan peluang magang."
          }
        },
        {
          "@type": "Question",
          "name": "Apa itu tes RIASEC dan Holland Test?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "RIASEC adalah teori kepribadian karir yang dikembangkan oleh John Holland. RIASEC adalah singkatan dari Realistic, Investigative, Artistic, Social, Enterprising, dan Conventional — enam tipe kepribadian yang membantu seseorang menemukan karir yang paling sesuai dengan karakter mereka."
          }
        },
        {
          "@type": "Question",
          "name": "Bagaimana cara menemukan beasiswa melalui Talentika?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Di halaman Opportunities, Talentika menampilkan informasi beasiswa terbaru dari berbagai sumber terpercaya, dikategorikan berdasarkan jenis (beasiswa, magang, kompetisi, konferensi, lowongan kerja) dan diperbarui secara otomatis setiap hari."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah Talentika tersedia di semua daerah Indonesia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya, Talentika adalah platform berbasis web yang dapat diakses dari seluruh Indonesia selama ada koneksi internet. Kami juga mengoptimalkan tampilan untuk penggunaan di perangkat mobile."
          }
        }
